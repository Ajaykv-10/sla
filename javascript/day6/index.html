
<script>
    // Task 1
const getStudent = (callback) => {
return new Promise((resolve,reject)=>{
 setTimeout(() => {

    resolve(callback("Sudhan"));

  }, 2000);
})
 

};
function callback(name){
    return `Student Name: ${name}`;
}
getStudent(callback).then((studentName)=>{
    console.log("studentName",studentName);
}).catch((error)=>{
    console.error(error);
})
